<svg width="200" height="40" viewBox="0 0 200 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Clip the descender of 'q' at baseline level (y=28) -->
    <clipPath id="word-clip">
      <rect x="36" y="0" width="164" height="28"/>
    </clipPath>
  </defs>

  <!-- Cross symbol: 4 rectangular rays from center (16, 20) -->
  <!-- Upper ray: height=14, lower ray is 40% shorter → 14×0.6=8.4≈9 -->
  <g id="symbol" fill="#F5C518">
    <rect x="13" y="6"  width="6" height="14"/><!-- upper -->
    <rect x="2"  y="17" width="14" height="6"/><!-- left  -->
    <rect x="16" y="17" width="14" height="6"/><!-- right -->
    <rect x="13" y="23" width="6"  height="9"/><!-- lower (shorter) -->
  </g>

  <!-- Wordmark: "uniqore" Inter 600, clipped at baseline to remove q descender -->
  <text
    x="42"
    y="28"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="600"
    font-size="22"
    fill="#FFFFFF"
    clip-path="url(#word-clip)"
    letter-spacing="-0.4"
  >uniqore</text>
</svg>
