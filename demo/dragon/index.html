:root{
  --bg:#08080d;
  --bg2:#0d0d14;
  --surface:#13131c;

  --surface3:#21212e;

body{

    radial-gradient(ellipse 800px 400px at 10% 10%,rgba(193,18,31,.12),transparent 60%),

    radial-gradient(ellipse 1000px 600px at 50% 50%,rgba(122,12,20,.05),transparent 70%),
    var(--bg);
  background-attachment:fixed;
  position:relative;
}
body::before{

#app,#login-screen{position:relative;z-index:1}
.ambient-embers{position:fixed;inset:0;pointer-events:none;z-index:2;overflow:hidden}
.amb-e{position:absolute;border-radius:50%;background:radial-gradient(circle,#F4D03F 0%,#E63946 60%,transparent 100%);opacity:0;animation:ambRise linear infinite;box-shadow:0 0 6px #F4D03F,0 0 12px rgba(193,18,31,.7),0 0 20px rgba(244,208,63,.3)}
.amb-e.amb-gold{background:radial-gradient(circle,#fff 0%,#F4D03F 40%,#D4AF37 80%,transparent 100%);box-shadow:0 0 8px #F4D03F,0 0 16px rgba(212,175,55,.7),0 0 24px rgba(244,208,63,.4)}
@keyframes ambRise{
  0%{opacity:0;transform:translateY(0) translateX(0) scale(.5)}
  8%{opacity:1;transform:translateY(-8vh) translateX(10px) scale(1)}
  25%{transform:translateY(-25vh) translateX(-15px) scale(1.1)}
  50%{transform:translateY(-50vh) translateX(25px) scale(.95)}
  75%{transform:translateY(-75vh) translateX(-20px) scale(.8)}
  95%{opacity:.4}
  100%{opacity:0;transform:translateY(-110vh) translateX(15px) scale(.3)}
}

#sidebar::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    linear-gradient(180deg,rgba(193,18,31,.12),transparent 25%),
    linear-gradient(0deg,rgba(193,18,31,.06),transparent 30%);
}
#sidebar>*{position:relative;z-index:1}
#main{flex:1;overflow-y:auto}
#mob-header{display:none;position:fixed;top:0;left:0;right:0;height:54px;background:linear-gradient(180deg,var(--surface),var(--bg2));border-bottom:1px solid var(--border);z-index:400;align-items:center;padding:0 16px;gap:12px;backdrop-filter:blur(8px)}
#mob-header .logo{font-size:18px;font-weight:800;flex:1;letter-spacing:.02em}
.mob-icon-btn{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:6px;border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative;-webkit-tap-highlight-color:transparent}
.sb-logo{padding:22px 18px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:10px;position:relative}
.sb-logo::after{content:'';position:absolute;left:18px;right:18px;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.6}
.sb-logo-icon{width:120px;height:120px;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;animation:logoBreathe 4s ease-in-out infinite}
.sb-logo-icon::before{content:'';position:absolute;inset:-8px;border-radius:50%;background:radial-gradient(circle,rgba(244,208,63,.18),transparent 65%);animation:logoGlow 3s ease-in-out infinite}
.sb-logo-icon svg,.sb-logo-icon img{width:100%;height:100%;filter:drop-shadow(0 0 12px rgba(244,208,63,.3)) drop-shadow(0 0 4px rgba(193,18,31,.4))}
.sb-logo-text{text-align:center}
.sb-logo-text{font-size:16px;font-weight:800;letter-spacing:.02em;line-height:1}
.sb-logo-sub{font-size:10px;color:var(--gold);margin-top:3px;letter-spacing:.18em;text-transform:uppercase;font-weight:600}
.sb-section{padding:14px 18px 6px;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;opacity:.7}
.sb-nav{padding:4px 10px}
.sb-item{display:flex;align-items:center;gap:11px;padding:14px 12px;border-radius:10px;cursor:pointer;transition:.25s;color:var(--text2);font-size:14px;font-weight:500;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;z-index:1;touch-action:manipulation;user-select:none;-webkit-user-select:none;width:100%;border:none;background:none;font-family:inherit;text-align:left;-webkit-appearance:none;appearance:none}
.sb-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:linear-gradient(90deg,rgba(193,18,31,.18),transparent);transition:.35s;pointer-events:none}
.sb-item:active{background:rgba(193,18,31,.25);color:var(--text)}
@media(hover:hover){
  .sb-item:hover{background:rgba(255,255,255,.04);color:var(--text);transform:translateX(4px)}
  .sb-item:hover::before{width:100%}
  .sb-item:hover .icon{filter:drop-shadow(0 0 6px var(--brand-light));transform:scale(1.15)}
}
.sb-item.active{
  background:linear-gradient(90deg,var(--brand-glow),transparent);
  color:var(--text);
  box-shadow:inset 3px 0 0 var(--brand);
}
.sb-item.active .icon{filter:drop-shadow(0 0 6px var(--brand))}
.sb-item .icon{width:18px;text-align:center;font-size:16px;transition:.2s}
.sb-badge{margin-left:auto;background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;min-width:18px;text-align:center;box-shadow:0 0 10px var(--brand-glow)}
.sb-bottom{margin-top:auto;padding:12px 8px;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px 10px}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:var(--brand-glow);border:1px solid var(--brand);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--brand);flex-shrink:0}
.sb-user-name{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sb-user-role{font-size:11px;color:var(--text3)}
.btn-logout{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:6px 10px;border-radius:6px;transition:.15s;display:block;margin:4px auto 0;-webkit-tap-highlight-color:transparent}
.btn-logout:hover{color:var(--red)}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:
  radial-gradient(ellipse 900px 600px at 50% 50%,rgba(193,18,31,.18),transparent 60%),
  radial-gradient(ellipse at top,rgba(212,175,55,.08),transparent 60%),
  radial-gradient(ellipse at bottom,rgba(122,12,20,.12),transparent 60%),
  var(--bg);position:relative;overflow:hidden}

.login-bg-image::after{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse at center,transparent 0%,rgba(8,8,14,.7) 60%,var(--bg) 100%),
    linear-gradient(180deg,rgba(8,8,14,.3),rgba(8,8,14,.5));
}
@keyframes bgZoom{0%,100%{transform:scale(1.05)}50%{transform:scale(1.15)}}
.login-card{
  background:linear-gradient(180deg,rgba(19,19,28,.88),rgba(8,8,14,.92));
  backdrop-filter:blur(20px);
  border:1px solid var(--border2);
  border-radius:22px;padding:46px 36px 38px;width:100%;max-width:420px;
  position:relative;overflow:hidden;z-index:1;
  box-shadow:0 30px 100px rgba(0,0,0,.8),0 0 60px rgba(193,18,31,.12),inset 0 1px 0 rgba(244,208,63,.12);
}
.login-card::before{
  content:'';position:absolute;top:0;left:20px;right:20px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold) 50%,transparent);
}
.login-card::after{
  content:'';position:absolute;bottom:0;left:30%;right:30%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dark) 50%,transparent);opacity:.5;
}
.login-card-glow{position:absolute;top:-50px;left:50%;transform:translateX(-50%);width:300px;height:120px;background:radial-gradient(ellipse,rgba(193,18,31,.4),transparent 70%);pointer-events:none;animation:glowPulse 4s ease-in-out infinite}
@keyframes glowPulse{0%,100%{opacity:.6}50%{opacity:1}}
.login-logo{text-align:center;margin-bottom:32px;position:relative}
.login-logo-img{display:inline-flex;align-items:center;justify-content:center;width:240px;height:240px;margin-bottom:8px;position:relative}
.login-logo-img::before{content:'';position:absolute;inset:-20px;border-radius:50%;background:radial-gradient(circle,rgba(244,208,63,.18),transparent 60%);animation:logoGlow 3s ease-in-out infinite;pointer-events:none}
@keyframes logoGlow{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
.login-logo-img img{animation:logoBreathe 4s ease-in-out infinite;width:100%;height:100%}
@keyframes logoBreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.login-ornament{font-size:10px;color:var(--gold);letter-spacing:.6em;margin:8px 0 6px;opacity:.7}
.login-logo h1{font-size:34px;font-weight:900;letter-spacing:.32em;background:linear-gradient(180deg,#fff 0%,#f5f0e8 50%,#a8a098 100%);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1}
.login-logo p{font-size:10px;color:var(--gold);margin-top:10px;letter-spacing:.32em;text-transform:uppercase;font-weight:600;opacity:.85}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.12em;margin-bottom:7px;opacity:.8}
.form-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:13px 15px;color:var(--text);font-size:15px;outline:none;transition:.2s;-webkit-appearance:none;font-family:var(--sans)}
.form-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-glow)}
.form-input::placeholder{color:var(--text3)}
select.form-input{cursor:pointer}select.form-input option{background:var(--surface2)}
.btn-primary{
  width:100%;
  background:linear-gradient(135deg,var(--brand-light),var(--brand) 50%,var(--brand-dark));
  color:#fff;border:none;border-radius:10px;padding:15px;
  font-size:14px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  cursor:pointer;-webkit-tap-highlight-color:transparent;margin-top:8px;
  box-shadow:0 8px 24px rgba(193,18,31,.4),inset 0 1px 0 rgba(255,255,255,.15);
  transition:.25s;position:relative;overflow:hidden;
}
.btn-primary::before{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
  animation:btnShine 3s ease-in-out infinite;
}
@keyframes btnShine{0%{left:-100%}50%,100%{left:200%}}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 16px 40px rgba(193,18,31,.6),inset 0 1px 0 rgba(255,255,255,.25),0 0 30px rgba(244,208,63,.2)}
.btn-primary:active{transform:translateY(0)}
.login-hint{text-align:center;margin-top:20px;font-size:11px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase}
.login-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;color:var(--red);font-size:13px;margin-top:8px}
.page-header{padding:26px 26px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.page-title{font-size:24px;font-weight:800;letter-spacing:.01em;line-height:1.1}
.page-sub{font-size:11px;color:var(--gold);margin-top:6px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;opacity:.8}
.page-body{padding:18px 26px 32px}.hdr-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.grid{display:grid;gap:14px}.g5{grid-template-columns:repeat(5,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:repeat(2,1fr)}
.card{
  background:linear-gradient(180deg,var(--surface),var(--bg2));
  border:1px solid var(--border);border-radius:14px;padding:18px;
  transition:.25s;position:relative;
}
.card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 12px 32px rgba(0,0,0,.4)}
.card-sm{padding:16px}
.metric-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.14em}
.metric-value{font-size:28px;font-weight:800;line-height:1;margin-top:8px;letter-spacing:-.01em}

    linear-gradient(135deg,rgba(122,12,20,.55),rgba(10,10,16,.85));
  border:1px solid var(--brand-dark);
  border-radius:20px;padding:36px 36px;margin-bottom:22px;
  overflow:hidden;display:flex;align-items:center;gap:24px;min-height:240px;
  box-shadow:0 30px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(244,208,63,.2);
  opacity:1;
}
.hero-strip::after{
  content:'';position:absolute;left:0;top:0;bottom:0;width:50%;
  background:radial-gradient(ellipse at left,rgba(193,18,31,.3),transparent 70%);
  pointer-events:none;animation:pulse 6s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.hero-dragon{display:none}
.ember{position:absolute;width:3px;height:3px;border-radius:50%;background:radial-gradient(circle,#F4D03F,#E63946);pointer-events:none;opacity:0;animation:rise 4s linear infinite;box-shadow:0 0 6px #F4D03F}
@keyframes rise{0%{opacity:0;transform:translateY(0) scale(.5)}10%{opacity:1}90%{opacity:.7}100%{opacity:0;transform:translateY(-180px) scale(.2)}}
.hero-text{position:relative;z-index:2;flex:1;min-width:0;max-width:55%}
.hero-eyebrow{font-size:11px;color:var(--gold);letter-spacing:.32em;text-transform:uppercase;font-weight:700;margin-bottom:10px;opacity:.95;text-shadow:0 2px 8px rgba(0,0,0,.8)}
.hero-text h2{font-size:30px;font-weight:900;line-height:1.15;margin-bottom:10px;letter-spacing:-.01em;text-shadow:0 4px 20px rgba(0,0,0,.9)}
.hero-text p{font-size:14px;color:var(--text);line-height:1.6;max-width:480px;text-shadow:0 2px 8px rgba(0,0,0,.9);opacity:.95}
.hero-stat{flex-shrink:0;position:relative;z-index:2;padding:16px 22px;background:linear-gradient(135deg,rgba(8,8,14,.7),rgba(8,8,14,.4));backdrop-filter:blur(8px);border:1px solid rgba(212,175,55,.4);border-radius:14px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.hero-stat .num{font-size:52px;font-weight:900;line-height:1;background:linear-gradient(135deg,#F4D03F,#D4AF37);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-.02em;text-shadow:0 0 40px rgba(244,208,63,.4)}
.hero-stat .lab{font-size:10px;color:var(--gold);letter-spacing:.26em;text-transform:uppercase;margin-top:6px;font-weight:700}

/* KPI CARDS — premium */
.kpi-card{
  position:relative;
  background:linear-gradient(180deg,rgba(28,28,38,.95),rgba(14,14,22,.95));
  border:1px solid var(--border);border-radius:14px;padding:20px 20px 18px;
  overflow:hidden;transition:.35s cubic-bezier(.2,.8,.2,1);
  opacity:1;
}
.kpi-card::after{
  content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(244,208,63,.08),transparent);
  transition:left .6s ease;pointer-events:none;
}
.kpi-card:hover{border-color:var(--gold-dark);transform:translateY(-4px) scale(1.02);box-shadow:0 20px 50px rgba(0,0,0,.5),0 0 30px rgba(193,18,31,.15)}
.kpi-card:hover::after{left:150%}
.kpi-card:hover .kpi-val{text-shadow:0 0 20px rgba(244,208,63,.4)}
.kpi-bar{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--brand-light) 50%,transparent);opacity:.7}
.kpi-gold .kpi-bar{background:linear-gradient(90deg,transparent,var(--gold) 50%,transparent)}
.kpi-green .kpi-bar{background:linear-gradient(90deg,transparent,var(--green) 50%,transparent)}
.kpi-label{font-size:10px;color:var(--gold);letter-spacing:.22em;text-transform:uppercase;font-weight:600;opacity:.8;margin-bottom:12px}
.kpi-val{font-size:34px;font-weight:900;line-height:1;letter-spacing:-.02em;color:#fff}
.kpi-gold .kpi-val{background:linear-gradient(135deg,var(--gold-light),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.kpi-green .kpi-val{color:var(--green)}
.kpi-cur{font-size:13px;font-weight:600;color:var(--text2);margin-left:6px;letter-spacing:.06em;-webkit-text-fill-color:var(--text2)}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:8px;letter-spacing:.02em}

/* ═══════════════════════════════════════════════════════
   PREMIUM DRAGON STYLING — applied to ALL pages
   ═══════════════════════════════════════════════════════ */

/* Page headers — gold eyebrow above title */
.page-header{position:relative;padding:28px 28px 14px}
.page-header::after{content:'';position:absolute;left:28px;width:80px;height:2px;bottom:0;background:linear-gradient(90deg,var(--brand-light),transparent);border-radius:99px}
.page-sub{font-size:10px;color:var(--gold);margin-top:8px;letter-spacing:.28em;text-transform:uppercase;font-weight:700;opacity:.85}
.page-body{opacity:1}

/* Card — premium with hover lift + golden shimmer */
.card{
  background:linear-gradient(180deg,rgba(25,25,35,.92),rgba(10,10,16,.92));
  border:1px solid var(--border);border-radius:14px;padding:18px;
  position:relative;overflow:hidden;
  transition:.35s cubic-bezier(.2,.8,.2,1);
}
.card::before{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  transition:left .8s ease;
}
.card:hover{border-color:var(--gold-dark);transform:translateY(-3px);box-shadow:0 20px 50px rgba(0,0,0,.5),0 0 30px rgba(193,18,31,.15)}
.card:hover::before{left:140%}

/* Tables — premium */
.table-wrap{
  background:linear-gradient(180deg,rgba(25,25,35,.85),rgba(10,10,16,.85));
  border:1px solid var(--border);border-radius:14px;overflow:hidden;
  transition:.3s;
}
.table-wrap:hover{border-color:var(--border2);box-shadow:0 16px 40px rgba(0,0,0,.4)}
thead th{
  background:linear-gradient(180deg,rgba(15,15,22,.6),rgba(10,10,16,.6));
  color:var(--gold);letter-spacing:.16em;text-transform:uppercase;
  font-size:10px;font-weight:700;border-bottom:1px solid var(--gold-dark);
  padding:14px 14px;
}
tbody td{padding:14px;border-bottom:1px solid rgba(212,175,55,.08);font-size:13px}
tbody tr{transition:.2s;cursor:pointer;position:relative}
tbody tr:hover{background:linear-gradient(90deg,rgba(193,18,31,.1),rgba(193,18,31,.04) 40%,transparent);transform:scale(1.005)}
tbody tr:hover td:first-child{box-shadow:inset 3px 0 0 var(--brand-light)}

/* Status badges — premium glow */
.status{
  display:inline-flex;align-items:center;gap:5px;padding:5px 12px;
  border-radius:99px;font-size:10.5px;font-weight:700;white-space:nowrap;
  letter-spacing:.08em;text-transform:uppercase;border:1px solid;
  transition:.3s;
}
.status:hover{transform:scale(1.05)}
.s-new{background:rgba(59,130,246,.12);color:#60a5fa;border-color:rgba(59,130,246,.4);box-shadow:0 0 12px rgba(59,130,246,.2)}
.s-contact{background:rgba(168,85,247,.12);color:#c084fc;border-color:rgba(168,85,247,.4);box-shadow:0 0 12px rgba(168,85,247,.2)}
.s-confirm{background:rgba(234,179,8,.12);color:var(--gold-light);border-color:rgba(234,179,8,.45);box-shadow:0 0 12px rgba(234,179,8,.25)}
.s-paid{background:rgba(34,197,94,.12);color:#4ade80;border-color:rgba(34,197,94,.4);box-shadow:0 0 12px rgba(34,197,94,.2)}
.s-ship{background:rgba(249,115,22,.12);color:#fb923c;border-color:rgba(249,115,22,.4);box-shadow:0 0 12px rgba(249,115,22,.2)}
.s-done{background:linear-gradient(135deg,rgba(34,197,94,.2),rgba(34,197,94,.08));color:#4ade80;border-color:rgba(34,197,94,.5);box-shadow:0 0 16px rgba(34,197,94,.3)}
.s-cancel{background:rgba(239,68,68,.12);color:#f87171;border-color:rgba(239,68,68,.4);box-shadow:0 0 12px rgba(239,68,68,.2)}

/* Inputs — premium dark */
.form-input,input[type="text"].form-input,input[type="email"].form-input,input[type="password"].form-input,input[type="number"].form-input,input[type="date"].form-input,select.form-input,textarea.form-input{
  background:linear-gradient(180deg,rgba(15,15,22,.8),rgba(8,8,14,.8));
  border:1.5px solid var(--border);transition:.25s;
}
.form-input:focus{
  border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,.15),0 0 20px rgba(193,18,31,.15);
  background:linear-gradient(180deg,rgba(18,18,26,.9),rgba(10,10,16,.9));
}

/* Filter row inputs (small ones in Orders page) */
.filt-row input,.filt-row select{
  background:linear-gradient(180deg,rgba(15,15,22,.8),rgba(8,8,14,.8))!important;
  border:1px solid var(--border)!important;color:var(--text)!important;
  transition:.25s;
}
.filt-row input:focus,.filt-row select:focus{border-color:var(--gold)!important;box-shadow:0 0 0 3px rgba(212,175,55,.15)!important}

/* Stat cards & misc metric */
.metric-label{color:var(--gold);letter-spacing:.22em;font-weight:700;opacity:.85}

/* Order cards (mobile-style) — premium */
.order-card{
  background:linear-gradient(180deg,rgba(25,25,35,.9),rgba(10,10,16,.9));
  border:1px solid var(--border);border-radius:12px;padding:14px;
  transition:.3s;position:relative;overflow:hidden;
}
.order-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:0;
  background:linear-gradient(180deg,var(--brand-light),var(--brand-dark));
  transition:.3s;
}
.order-card:hover{transform:translateX(4px);border-color:var(--gold-dark);box-shadow:0 12px 30px rgba(0,0,0,.4)}
.order-card:hover::before{width:3px;box-shadow:0 0 10px var(--brand)}

/* Empty state */
.empty-state{padding:60px 20px;text-align:center;color:var(--text2)}
.empty-state .icon{font-size:48px;margin-bottom:14px;display:block;animation:emptyFloat 3s ease-in-out infinite}
@keyframes emptyFloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-8px) rotate(3deg)}}
.empty-state p{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty-state .hint{font-size:12px;color:var(--gold);letter-spacing:.14em;text-transform:uppercase;opacity:.7;font-weight:600}

/* Alert banner — premium */
.alert-banner{
  background:linear-gradient(90deg,rgba(193,18,31,.1),rgba(193,18,31,.02));
  border:1px solid rgba(193,18,31,.35);border-radius:12px;padding:14px 18px;
  display:flex;align-items:center;gap:14px;cursor:pointer;
  transition:.3s;margin-bottom:14px;position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
.alert-banner::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(244,208,63,.08),transparent);
  animation:alertShine 4s ease-in-out infinite;
}
@keyframes alertShine{0%{left:-100%}50%,100%{left:100%}}
.alert-banner:hover{transform:translateX(4px);border-color:var(--brand);box-shadow:0 8px 24px rgba(193,18,31,.2)}
.alert-warn{background:linear-gradient(90deg,rgba(245,158,11,.08),rgba(245,158,11,.02));border-color:rgba(245,158,11,.35)}
.alert-warn:hover{border-color:var(--gold-light);box-shadow:0 8px 24px rgba(245,158,11,.2)}

/* Kanban */
.kanban-col{
  background:linear-gradient(180deg,rgba(20,20,28,.9),rgba(8,8,14,.9));
  border:1px solid var(--border);border-radius:14px;padding:14px;
  transition:.3s;
}
.kanban-col:hover{border-color:var(--gold-dark);box-shadow:0 12px 30px rgba(0,0,0,.4)}
.kanban-title{color:var(--gold);letter-spacing:.16em;text-transform:uppercase;font-size:10px;font-weight:700}
.kanban-count{
  background:linear-gradient(135deg,var(--brand),var(--brand-dark));
  color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;
  box-shadow:0 0 10px var(--brand-glow);
}

.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.modal-header h2{font-size:16px;font-weight:700;flex:1}
.modal-body{padding:18px 22px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.modal-section{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.modal-section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0}
.btn-secondary{flex:1;padding:11px;border-radius:10px;border:1.5px solid var(--border);background:none;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-submit{flex:2;padding:11px;border-radius:10px;border:none;background:var(--brand);color:#fff;font-size:14px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.settings-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden}
.settings-section-header{padding:14px 18px;border-bottom:1px solid var(--border);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.settings-row{display:grid;grid-template-columns:1fr repeat(3,90px) 70px;gap:8px;padding:10px 18px;border-bottom:1px solid var(--border);align-items:center}
.settings-row:last-child{border-bottom:none}
.settings-row-header{background:var(--surface2);font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase}
.settings-inp{background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;padding:6px 9px;color:var(--text);font-size:12px;outline:none;width:100%;text-align:right;-webkit-appearance:none}
.settings-inp:focus{border-color:var(--brand)}.settings-name{font-size:12.5px;font-weight:600}
.btn-settings-save{padding:8px 18px;background:var(--brand);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
#panel-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:190;display:none}
#panel-backdrop.open{display:block}
#mob-overlay{position:fixed;top:0;right:0;bottom:0;left:250px;background:rgba(0,0,0,.5);z-index:490;display:none}
#mob-overlay.open{display:block}
#sync-status{position:fixed;bottom:16px;right:16px;padding:8px 14px;border-radius:10px;font-size:12px;font-weight:600;z-index:500;transition:.3s;opacity:0;pointer-events:none}
#sync-status.show{opacity:1}
#sync-status.syncing{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:var(--blue)}
#sync-status.ok{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:var(--green)}
#sync-status.err{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);font-size:13px;gap:10px}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .icon{font-size:48px;margin-bottom:12px}.empty-state p{font-size:14px}.empty-state .hint{font-size:12px;margin-top:6px}
@media(max-width:768px){
  #mob-header{display:flex}
  #sidebar{position:fixed;left:-260px;top:0;bottom:0;z-index:9999;width:250px;min-width:250px}
  #sidebar.mob-open{left:0}
  #mob-overlay{z-index:9000}
  #main{padding-top:52px}
  #app{flex-direction:column}
  .page-header{padding:14px 16px 0}.page-body{padding:12px 16px 24px}.page-title{font-size:18px}
  .g5{grid-template-columns:repeat(2,1fr)}.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  #detail-panel{width:100%;right:-100%}#detail-panel.open{right:0}
  .notif-panel{width:100%;right:-100%}.notif-panel.open{right:0}
  .modal{border-radius:20px 20px 0 0;max-height:95vh}
  .hdr-actions .notif-btn{display:none}
  .hdr-actions .btn-add{font-size:12px;padding:7px 12px}
  .filters{gap:6px}.filter-input{min-width:140px;font-size:13px}
  .tabs .tab{padding:6px 10px;font-size:12px}.metric-value{font-size:22px}
  .stock-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .settings-row{grid-template-columns:1fr repeat(3,70px) 50px;gap:5px;padding:8px 12px}
}
@media(min-width:769px){
  #modal-overlay{align-items:center}.modal{border-radius:20px;max-width:560px}
}
</style>
</head>

<div class="ambient-embers" aria-hidden="true" id="ambient-embers"></div>
<script>
(function(){
  const c=document.getElementById('ambient-embers');if(!c)return
  const COUNT=40
  let html=''
  for(let i=0;i<COUNT;i++){
    const left=Math.random()*100
    const delay=Math.random()*14
    const dur=10+Math.random()*10
    const size=1+Math.random()*3
    const tint=Math.random()>.6?'g':'r'
    html+=`<div class="amb-e ${tint==='g'?'amb-gold':''}" style="left:${left}%;bottom:-10px;width:${size}px;height:${size}px;animation-delay:${delay}s;animation-duration:${dur}s"></div>`
  }
  c.innerHTML=html
})()
</script>

async function sb(path,opts={}){
  await new Promise(r=>setTimeout(r,80+Math.random()*160)) // имитация сети
  const db=_demoDB()
  const method=(opts.method||'GET').toUpperCase()
  const qi=path.indexOf('?')
  const table=qi<0?path:path.slice(0,qi)
  const qs=qi<0?'':path.slice(qi+1)
  const params={}
  qs.split('&').forEach(p=>{if(!p)return;const i=p.indexOf('=');const k=i<0?p:p.slice(0,i);params[k]=i<0?'':decodeURIComponent(p.slice(i+1))})
  const body=opts.body?JSON.parse(opts.body):null
  const save=r=>{_demoSave(db);return r}
  function match(row){
    for(const k in params){
      if(k==='order'||k==='limit'||k==='select')continue
      const v=params[k]
      if(typeof v==='string'&&v.indexOf('eq.')===0){if(String(row[k])!==v.slice(3))return false}
    }
    return true
  }
  const desc=(a,b)=>(b.created_at||'').localeCompare(a.created_at||'')

  if(table==='orders'){
    if(method==='GET') return db.orders.slice().sort(desc)
    if(method==='POST'){const row={...body};if(!row.created_at)row.created_at=new Date().toISOString();db.orders.push(row);return save(null)}
    if(method==='PATCH'){db.orders=db.orders.map(o=>match(o)?{...o,...body}:o);return save(null)}
    if(method==='DELETE'){
      if(params.created_at&&params.created_at.indexOf('gte.')===0){db.orders=[];return save(null)}
      db.orders=db.orders.filter(o=>!match(o));return save(null)
    }
  }
  if(table==='expenses'){
    if(method==='GET') return db.expenses.slice().sort(desc)
    if(method==='POST'){db.expenses.push({id:'exp-'+Date.now()+'-'+Math.random().toString(36).slice(2,6),created_at:new Date().toISOString(),...body});return save(null)}
    if(method==='PATCH'){db.expenses=db.expenses.map(e=>match(e)?{...e,...body}:e);return save(null)}
    if(method==='DELETE'){db.expenses=db.expenses.filter(e=>!match(e));return save(null)}
  }
  if(table==='stock'){
    if(method==='GET') return db.stock.slice()
    if(method==='POST'){const i=db.stock.findIndex(s=>s.product_id===body.product_id);if(i>=0)db.stock[i]={...db.stock[i],...body};else db.stock.push({...body});return save(null)}
  }
  if(table==='notifications'){
    if(method==='GET'){let r=db.notifications.slice().sort(desc);const lim=params.limit?parseInt(params.limit):r.length;return r.slice(0,lim)}
    if(method==='POST'){db.notifications.unshift({id:'ntf-'+Date.now()+'-'+Math.random().toString(36).slice(2,6),created_at:new Date().toISOString(),...body});return save(null)}
    if(method==='PATCH'){db.notifications=db.notifications.map(n=>match(n)?{...n,...body}:n);return save(null)}
  }
  if(table==='settings'){
    if(method==='GET') return db.settings.filter(match)
    if(method==='POST'){const i=db.settings.findIndex(s=>s.key===body.key);if(i>=0)db.settings[i]={...db.settings[i],...body};else db.settings.push({...body});return save(null)}
  }
  return null
}

function doLogin(){

let oView='table',oFilter='',oStatus='',oSource='',cachedOrders=[]

  })
  document.getElementById('page-orders').innerHTML=`
    ${headerHTML('Заявки',`Всего: ${cachedOrders.length}`)}
    <div class="page-body">
      <div class="filters">
        <input class="filter-input" placeholder="🔍 Поиск..." value="${oFilter}" oninput="oFilter=this.value;_renderOrdersUI()">

      </div>
      ${filtered.length===0?`<div class="empty-state"><div class="icon">📭</div><p>${cachedOrders.length===0?'Заявок пока нет':'Ничего не найдено'}</p>${cachedOrders.length===0?'<div class="hint">Нажмите «+ Новая заявка»</div>':''}</div>`:
        isMobile()?renderOrderCards(filtered):oView==='table'?renderTable(filtered):renderKanban(filtered)}

}

// ── FINANCE ───────────────────────────────────────────
let finPeriod='month'

function getPeriodDates(period){
  const now=new Date()
  let from=new Date()
  if(period==='day'){from=new Date(now.getFullYear(),now.getMonth(),now.getDate())}
  else if(period==='week'){from=new Date(now);from.setDate(now.getDate()-6)}
  else if(period==='month'){from=new Date(now.getFullYear(),now.getMonth(),1)}
  else{from=new Date(2020,0,1)}
  return{from,to:now}
}
function inPeriod(dateStr,period){
  if(period==='all')return true
  const {from,to}=getPeriodDates(period)
  const parts=dateStr.split('.')
  if(parts.length!==3)return false
  const d=new Date(parseInt(parts[2]),parseInt(parts[1])-1,parseInt(parts[0]))
  return d>=from&&d<=to
}
function inPeriodISO(isoStr,period){
  if(period==='all')return true
  const {from,to}=getPeriodDates(period)
  const d=new Date(isoStr)
  return d>=from&&d<=to
}

  const [orders,expenses]=await Promise.all([getOrders(),getExpenses()])

function getPrevPeriodDates(period){
  const now=new Date()
  if(period==='day'){const s=new Date(now.getFullYear(),now.getMonth(),now.getDate()-1);return{from:s,to:new Date(s.getFullYear(),s.getMonth(),s.getDate(),23,59,59)}}
  if(period==='week'){const e=new Date(now);e.setDate(now.getDate()-7);const s=new Date(e);s.setDate(e.getDate()-6);return{from:s,to:e}}
  if(period==='month'){const s=new Date(now.getFullYear(),now.getMonth()-1,1);const e=new Date(now.getFullYear(),now.getMonth(),0,23,59,59);return{from:s,to:e}}
  return{from:new Date(2000,0,1),to:new Date(2000,0,1)}
}
function inPrevPeriod(dateStr,period){
  if(period==='all')return false
  const {from,to}=getPrevPeriodDates(period)
  const p=dateStr.split('.');if(p.length!==3)return false
  const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]))
  return d>=from&&d<=to
}
function inPrevPeriodISO(iso,period){
  if(period==='all')return false
  const {from,to}=getPrevPeriodDates(period)
  const d=new Date(iso);return d>=from&&d<=to
}

function _renderFinanceUI(orders,expenses){
  const period=finPeriod
  const periodOrders=orders.filter(o=>inPeriod(o.date,period))
  const periodExp=expenses.filter(e=>inPeriodISO(e.created_at||new Date().toISOString(),period))
  const done=periodOrders.filter(o=>DONE_ST.includes(o.status))
  const revenue=done.reduce((s,o)=>s+o.price,0)
  const cogs=done.reduce((s,o)=>s+o.cost,0)
  const totalExp=periodExp.reduce((s,e)=>s+Number(e.amount),0)
  const netProfit=revenue-cogs-totalExp
  const margin=revenue?Math.round(netProfit/revenue*100):0
  const adExp=periodExp.filter(e=>e.category==='Реклама').reduce((s,e)=>s+Number(e.amount),0)
  const logExp=periodExp.filter(e=>e.category==='Логистика').reduce((s,e)=>s+Number(e.amount),0)

  // Сравнение с прошлым периодом
  const prevDone=orders.filter(o=>inPrevPeriod(o.date,period)&&DONE_ST.includes(o.status))
  const prevExp=expenses.filter(e=>inPrevPeriodISO(e.created_at||'',period))
  const prevRev=prevDone.reduce((s,o)=>s+o.price,0)
  const prevCogs=prevDone.reduce((s,o)=>s+o.cost,0)
  const prevTotalExp=prevExp.reduce((s,e)=>s+Number(e.amount),0)
  const prevNet=prevRev-prevCogs-prevTotalExp
  const dlt=(cur,prev)=>prev?Math.round((cur-prev)/Math.abs(prev)*100):null
  const revDelta=dlt(revenue,prevRev)
  const netDelta=dlt(netProfit,prevNet)
  const fmtDelta=d=>d===null?'':` · <span style="color:${d>=0?'var(--green)':'var(--red)'}">${d>=0?'↑':'↓'}${Math.abs(d)}%</span>`

  // Grouped expenses by category
  const expByCat={}
  periodExp.forEach(e=>{expByCat[e.category]=(expByCat[e.category]||0)+Number(e.amount)})

  // Revenue by source
  const srcRev={}
  done.forEach(o=>{srcRev[o.source]=(srcRev[o.source]||0)+o.price})

  // Weekly breakdown (last 4 weeks for month, last 7 days for week)
  const periodLabels={day:'Сегодня',week:'Эта неделя',month:'Этот месяц',all:'Всё время'}

async function submitExpense(){
  const cat=document.getElementById('exp-cat')?.value
  const amount=parseFloat(document.getElementById('exp-amount')?.value)
  const note=document.getElementById('exp-note')?.value?.trim()||''
  const date=document.getElementById('exp-date')?.value||new Date().toISOString().split('T')[0]
  if(!amount||isNaN(amount)||amount<=0){alert('Введите сумму');return}
  const ok=await addExpense(cat,amount,note,date)
  if(ok)renderFinance()
}

async function removeExpense(id){
  if(!confirm('Удалить этот расход?'))return
  const ok=await deleteExpense(id)
  if(ok)renderFinance()
}

async function saveExpenseEdit(id){
  const cat=document.getElementById('ee-cat-'+id)?.value
  const amount=parseFloat(document.getElementById('ee-amount-'+id)?.value)
  const date=document.getElementById('ee-date-'+id)?.value
  const note=document.getElementById('ee-note-'+id)?.value?.trim()||''
  if(!amount||isNaN(amount)||amount<=0){alert('Введите сумму');return}
  const ok=await updateExpense(id,{category:cat,amount,date,note})
  if(ok){editingExpenseId=null;renderFinance()}
}

let anPeriod='month'

async function renderAnalytics(){
  document.getElementById('page-analytics').innerHTML=headerHTML('Аналитика','')+loading()
  const [orders,expenses]=await Promise.all([getOrders(),getExpenses()])
  _renderAnalyticsUI(orders,expenses)
}

function _renderAnalyticsUI(orders,expenses){
  const period=anPeriod
  const now=new Date()
  const periodLabels={day:'Сегодня',week:'Эта неделя',month:'Этот месяц',all:'Всё время'}

  function ordInPeriod(o){return inPeriod(o.date,period)}
  function ordInPrevPeriod(o){
    const parts=o.date.split('.');if(parts.length!==3)return false
    const od=new Date(parseInt(parts[2]),parseInt(parts[1])-1,parseInt(parts[0]))
    if(period==='day'){const y=new Date(now);y.setDate(now.getDate()-1);return od.toDateString()===y.toDateString()}
    if(period==='week'){const from=new Date(now);from.setDate(now.getDate()-13);const to=new Date(now);to.setDate(now.getDate()-7);return od>=from&&od<=to}
    if(period==='month'){return od.getFullYear()===now.getFullYear()&&od.getMonth()===now.getMonth()-1}
    return false
  }

  const cur=orders.filter(ordInPeriod)
  const prev=orders.filter(ordInPrevPeriod)
  const curDone=cur.filter(o=>DONE_ST.includes(o.status))
  const prevDone=prev.filter(o=>DONE_ST.includes(o.status))

  const revenue=curDone.reduce((s,o)=>s+o.price,0)
  const prevRevenue=prevDone.reduce((s,o)=>s+o.price,0)
  const cogs=curDone.reduce((s,o)=>s+o.cost,0)
  const profit=revenue-cogs
  const convRate=cur.length?Math.round(curDone.length/cur.length*100):0
  const prevConv=prev.length?Math.round(prevDone.length/prev.length*100):0
  const avgCheck=curDone.length?Math.round(revenue/curDone.length):0
  const adExp=expenses.filter(e=>inPeriodISO(e.created_at||'',period)&&e.category==='Реклама').reduce((s,e)=>s+Number(e.amount),0)
  const cac=curDone.length&&adExp?Math.round(adExp/curDone.length):0
  const revGrowth=prevRevenue?Math.round((revenue-prevRevenue)/prevRevenue*100):null
  const ordGrowth=prev.length?Math.round((cur.length-prev.length)/prev.length*100):null

  // Trend chart — N days
  const trendN=period==='month'?30:period==='week'?7:14
  const trend=Array.from({length:trendN},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(trendN-1-i))
    const ds=d.toLocaleDateString('ru-RU')
    const dd=orders.filter(o=>o.date===ds&&DONE_ST.includes(o.status))
    const lbl=trendN<=7?d.toLocaleDateString('ru-RU',{weekday:'short'}):d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'})
    return{label:lbl,rev:dd.reduce((s,o)=>s+o.price,0),cnt:dd.length,profit:dd.reduce((s,o)=>s+(o.price-o.cost),0)}
  })
  const maxRev=Math.max(...trend.map(d=>d.rev),1)

  // Funnel
  const funnelSteps=[
    {stage:'Все заявки',count:cur.length},
    {stage:'Связались',count:cur.filter(o=>o.status!=='🆕 Новая').length},
    {stage:'Подтверждён',count:cur.filter(o=>['✅ Подтверждён','💳 Оплачен','🚚 Отправлен','📦 Доставлен'].includes(o.status)).length},
    {stage:'Оплачен',count:cur.filter(o=>['💳 Оплачен','🚚 Отправлен','📦 Доставлен'].includes(o.status)).length},
    {stage:'Доставлен',count:curDone.length},
    {stage:'Отменён',count:cur.filter(o=>o.status==='❌ Отменён').length},
  ]

  // Products by revenue
  const prodRevMap={};const prodCntMap={};const prodProfMap={}
  curDone.forEach(o=>{
    const k=o.product+' · '+o.color+(o.size&&o.size!=='One Size'?' · '+o.size:'')
    prodRevMap[k]=(prodRevMap[k]||0)+o.price
    prodCntMap[k]=(prodCntMap[k]||0)+1
    prodProfMap[k]=(prodProfMap[k]||0)+(o.price-o.cost)
  })
  const topProds=Object.entries(prodRevMap).sort((a,b)=>b[1]-a[1])
  const maxProd=topProds[0]?.[1]||1

  // Sources with conversion
  const srcAll={};const srcDoneMap={}
  cur.forEach(o=>{srcAll[o.source]=(srcAll[o.source]||0)+1})
  curDone.forEach(o=>{srcDoneMap[o.source]=(srcDoneMap[o.source]||0)+1})
  const sources=Object.entries(srcAll).sort((a,b)=>b[1]-a[1])

  // Customers
  const phoneMap={}
  orders.forEach(o=>{if(!phoneMap[o.phone])phoneMap[o.phone]=[];phoneMap[o.phone].push(o)})
  const allCustomers=Object.keys(phoneMap).length
  const repeatCustomers=Object.values(phoneMap).filter(arr=>arr.length>1).length

  document.getElementById('page-analytics').innerHTML=`
    ${headerHTML('Аналитика','Полная отчётность')}
    <div class="page-body">
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
        <div class="tabs">
          <div class="tab ${period==='day'?'active':''}" onclick="anPeriod='day';renderAnalytics()">День</div>
          <div class="tab ${period==='week'?'active':''}" onclick="anPeriod='week';renderAnalytics()">Неделя</div>
          <div class="tab ${period==='month'?'active':''}" onclick="anPeriod='month';renderAnalytics()">Месяц</div>
          <div class="tab ${period==='all'?'active':''}" onclick="anPeriod='all';renderAnalytics()">Всё время</div>
        </div>
        <span style="font-size:12px;color:var(--text3)">${periodLabels[period]}</span>
      </div>
      ${orders.length===0?`<div class="empty-state"><div class="icon">📈</div><p>Данных пока нет</p><div class="hint">Аналитика появится после первых заявок</div></div>`:`

      <div class="grid g4" style="margin-bottom:12px">
        <div class="card card-sm">
          <div class="metric-label">Выручка</div>
          <div class="metric-value mv-blue">${Math.round(revenue)}<span style="font-size:12px"> BYN</span></div>
          ${revGrowth!==null?`<div class="metric-sub" style="color:${revGrowth>=0?'var(--green)':'var(--red)'}">${revGrowth>=0?'▲':'▼'} ${Math.abs(revGrowth)}% vs прошлый</div>`:`<div class="metric-sub">${curDone.length} продаж</div>`}
        </div>
        <div class="card card-sm">
          <div class="metric-label">Заявок</div>
          <div class="metric-value">${cur.length}</div>
          ${ordGrowth!==null?`<div class="metric-sub" style="color:${ordGrowth>=0?'var(--green)':'var(--red)'}">${ordGrowth>=0?'▲':'▼'} ${Math.abs(ordGrowth)}% vs прошлый</div>`:`<div class="metric-sub">${curDone.length} закрыто</div>`}
        </div>
        <div class="card card-sm">
          <div class="metric-label">Конверсия</div>
          <div class="metric-value mv-yellow">${convRate}%</div>
          ${prev.length?`<div class="metric-sub" style="color:${convRate>=prevConv?'var(--green)':'var(--red)'}">${convRate>=prevConv?'▲':'▼'} было ${prevConv}%</div>`:`<div class="metric-sub">из заявки в продажу</div>`}
        </div>
        <div class="card card-sm">
          <div class="metric-label">Чистая прибыль</div>
          <div class="metric-value mv-green">${Math.round(profit)}<span style="font-size:12px"> BYN</span></div>
          <div class="metric-sub">маржа ${revenue?Math.round(profit/revenue*100):0}%</div>
        </div>
      </div>

      <div class="grid g4" style="margin-bottom:12px">
        <div class="card card-sm">
          <div class="metric-label">Средний чек</div>
          <div class="metric-value" style="font-size:22px">${avgCheck} BYN</div>
        </div>
        <div class="card card-sm">
          <div class="metric-label">CAC (стоим. клиента)</div>
          <div class="metric-value" style="font-size:22px;color:var(--yellow)">${cac||'—'} ${cac?'BYN':''}</div>
          <div class="metric-sub">реклама ${Math.round(adExp)} BYN</div>
        </div>
        <div class="card card-sm">
          <div class="metric-label">ROI рекламы</div>
          <div class="metric-value" style="font-size:22px;color:var(--blue)">${adExp?Math.round(revenue/adExp*100)+'%':'—'}</div>
          <div class="metric-sub">${adExp?'1 BYN рекл → '+Math.round(revenue/adExp)+' BYN':'нет расходов на рекл.'}</div>
        </div>
        <div class="card card-sm">
          <div class="metric-label">Повторные клиенты</div>
          <div class="metric-value" style="font-size:22px;color:var(--green)">${allCustomers?Math.round(repeatCustomers/allCustomers*100):0}%</div>
          <div class="metric-sub">${repeatCustomers} из ${allCustomers} клиентов</div>
        </div>
      </div>

      <!-- Revenue trend chart -->
      <div class="card" style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div style="font-size:13px;font-weight:700">📊 Выручка по дням</div>
          <div style="font-size:12px;color:var(--text3)">${Math.round(revenue)} BYN · ${curDone.length} заказов</div>
        </div>
        <div style="display:flex;align-items:flex-end;gap:2px;height:90px">
          ${trend.map(d=>`<div class="bar-col" style="flex:1" title="${d.label}: ${d.rev} BYN">
            <div style="display:flex;flex-direction:column-reverse;height:78px;width:100%;gap:1px">
              <div class="bar-fill bf-prof" style="height:${d.profit>0?Math.max(2,d.profit/maxRev*78)+'px':'0'}"></div>
              <div class="bar-fill bf-rev" style="height:${d.rev-d.profit>0?Math.max(2,(d.rev-d.profit)/maxRev*78)+'px':'0'}"></div>
            </div>
            <div class="bar-label">${d.label}</div>
          </div>`).join('')}
        </div>
        <div style="display:flex;gap:14px;margin-top:8px;font-size:11px;color:var(--text3)">
          <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--brand);display:inline-block"></span>Себест.</span>
          <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--green);display:inline-block"></span>Прибыль</span>
        </div>
      </div>

      <div class="grid g2" style="margin-bottom:12px">
        <!-- Funnel -->
        <div class="card">
          <div style="font-size:13px;font-weight:700;margin-bottom:12px">🎯 Воронка продаж</div>
          ${funnelSteps.map((f,i)=>{
            const pct=funnelSteps[0].count?Math.round(f.count/funnelSteps[0].count*100):0

            const barColor=i===funnelSteps.length-1?'var(--red)':i===0?'var(--blue)':'var(--brand)'
            return`<div style="margin-bottom:10px">
              <div style="display:flex;justify-content:space-between;margin-bottom:3px">
                <span style="font-size:12px;color:var(--text2)">${f.stage}</span>

                  ${stepConv!==null?`<span style="font-size:10px;color:${stepConv>=50?'var(--green)':'var(--yellow)'}">${stepConv}%↓</span>`:''}
                  <span style="font-size:12px;font-weight:700">${f.count}</span>

async function saveSettingsProducts(){
  const updated=PRODUCTS.map((p,i)=>({...p,
    price:parseFloat(document.getElementById('sp-price-'+i)?.value)||p.price,
    cost:parseFloat(document.getElementById('sp-cost-'+i)?.value)||p.cost,
    minStock:parseInt(document.getElementById('sp-min-'+i)?.value)||p.minStock,
  }))
  showSync('syncing','⟳ Сохраняю...')
  try{await saveProductsToSB(updated);showSync('ok','✓ Товары сохранены');renderSettings()}
  catch(e){showSync('err','✗ Ошибка')}
}
async function clearAllOrders(){
  showSync('syncing','⟳ Удаляю...')
  try{
    await sb('orders?created_at=gte.2000-01-01',{method:'DELETE',prefer:'return=minimal'})
    cachedOrders=[];showSync('ok','✓ Всё очищено')
    if(document.getElementById('page-orders').style.display!=='none')_renderOrdersUI()
    else renderDashboard()
  }catch(e){showSync('err','✗ Ошибка: '+e.message);console.error(e)}
}

let notifOpen=false
function toggleNotif(){
  notifOpen=!notifOpen
  document.getElementById('notif-panel').classList.toggle('open',notifOpen)
  if(notifOpen){renderNotifs();sb('notifications?read=eq.false',{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({read:true})}).catch(()=>{});setTimeout(updateNotifBadge,600)}
}
function closeNotif(){notifOpen=false;document.getElementById('notif-panel').classList.remove('open')}
async function renderNotifs(){
  const list=document.getElementById('notif-list');if(!list)return
  const n=await getNotifs()
  list.innerHTML=n.length?n.map(x=>`<div class="notif-item ${x.read?'':'unread'}" onclick="${x.order_id?`openDetail('${x.order_id}');closeNotif()`:''}" style="${x.order_id?'cursor:pointer':''}"><div class="notif-item-title">${x.title}</div><div class="notif-item-body">${x.body}</div><div class="notif-item-time">${x.time}</div></div>`).join(''):'<div style="padding:48px 20px;text-align:center;color:var(--text3);font-size:13px">Нет уведомлений</div>'
}

  document.getElementById('modal-body').innerHTML=`

let itemRowCount=0
function addItemRow(){
  const i=itemRowCount++
  const sel=PRODUCTS.map(p=>`<option value="${p.id}">${p.name} · ${p.color}${p.size!=='One Size'?' · '+p.size:''} — ${p.price} BYN</option>`).join('')
  const row=document.createElement('div')
  row.className='form-grid'
  row.id='item-row-'+i
  row.style.marginBottom='8px'
  row.innerHTML=`<div><label class="form-label">Товар *</label><select class="form-input f-item-prod" data-idx="${i}" onchange="onItemChange()"><option value="">Выбрать...</option>${sel}</select></div><div style="display:flex;gap:6px;align-items:end"><div style="flex:1"><label class="form-label">Кол-во</label><input class="form-input f-item-qty" type="number" value="1" min="1" inputmode="numeric" onchange="onItemChange()"></div>${i>0?`<button type="button" class="btn-close" onclick="document.getElementById('item-row-${i}').remove();onItemChange()" style="margin-bottom:8px">✕</button>`:''}</div>`
  document.getElementById('f-items-list').appendChild(row)
}
function onItemChange(){
  let total=0,totalCost=0
  document.querySelectorAll('#f-items-list .form-grid').forEach(row=>{
    const sel=row.querySelector('.f-item-prod')
    const qty=parseInt(row.querySelector('.f-item-qty')?.value)||1
    const p=PRODUCTS.find(x=>x.id===sel?.value)
    if(p){total+=p.price*qty;totalCost+=p.cost*qty}
  })
  const tb=document.getElementById('f-total')
  if(total>0){tb.style.display='block';tb.textContent=`Итого: ${total} BYN · Прибыль: ${total-totalCost} BYN`}
  else{tb.style.display='none'}
}
function getModalItems(){
  const items=[]
  document.querySelectorAll('#f-items-list .form-grid').forEach(row=>{
    const sel=row.querySelector('.f-item-prod')
    const qty=parseInt(row.querySelector('.f-item-qty')?.value)||1
    const p=PRODUCTS.find(x=>x.id===sel?.value)
    if(p)for(let j=0;j<qty;j++)items.push(p)
  })
  return items
}
function sendNtfy(msg){/* демо: пуш-уведомления отключены */}
async function submitNewOrder(){
  const name=document.getElementById('f-name')?.value?.trim()
  const phone=document.getElementById('f-phone')?.value?.trim()
  const items=getModalItems()
  if(!name||!phone){alert('Заполните Имя и Телефон');return}
  if(!items.length){alert('Добавьте хотя бы один товар');return}
  const today=new Date().toLocaleDateString('ru-RU')
  const now=new Date();const ts=today+' '+now.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})
  const common={name,phone,tg:document.getElementById('f-tg')?.value?.trim()||'',city:document.getElementById('f-city')?.value?.trim()||'',source:document.getElementById('f-source')?.value||'TikTok',delivery:document.getElementById('f-delivery')?.value||'',status:'🆕 Новая',date:today,tracking:'',comments:[],manager:CU?.name||'Менеджер',comment:document.getElementById('f-comment')?.value?.trim()||'',fromSite:false,timeline:[{status:'🆕 Новая',time:ts,by:CU?.name||'Менеджер'}]}
  let allOk=true
  for(const p of items){
    const o={...common,id:`ORD-${Date.now()}-${Math.random().toString(36).slice(2,6)}`,productId:p.id,product:p.name,color:p.color,size:p.size,price:p.price,cost:p.cost}
    const ok=await insertOrder(o)
    if(!ok){allOk=false;break}
  }
  if(!allOk)return
  const desc=items.map(p=>p.color+(p.size!=='One Size'?' '+p.size:'')).join(', ')
  sendNtfy(name+' — '+desc)
  await addNotif('Новая заявка',`${name} · ${desc}`,items[0]?.id||'')
  closeModal()
  cachedOrders=await getOrders()
  navigate('orders')
}
